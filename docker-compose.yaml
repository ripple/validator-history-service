version: '3.8'

services:
  # PostgreSQL database service
  postgres:
    image: postgres:17.2
    container_name: vhs-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-vhs_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-vhs_password}
      POSTGRES_DB: ${DB_DATABASE:-validator_history}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vhs_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vhs-network

  # Rippled service for XRPL network
  rippled:
    image: xrpllabsofficial/xrpld:latest
    container_name: vhs-rippled
    ports:
      - "5005:5005"  # WebSocket
      - "51235:51235"  # Peer protocol
    volumes:
      - rippled_data:/var/lib/rippled
    networks:
      - vhs-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5005 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Validator History Service - API
  vhs-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vhs-api
    command: ["node", "build/index.js", "--api"]
    env_file:
      - path: .env
        required: false
    environment:
      # Override specific values for containerized environment
      DB_HOST: postgres
      RIPPLED_RPC_ADMIN: http://rippled:5005
      PORT: 3000
      ADDR: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vhs-network
    restart: unless-stopped

  # Validator History Service - Connection Manager
  vhs-connections:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vhs-connections
    command: ["node", "build/index.js", "--connections"]
    env_file:
      - path: .env
        required: false
    environment:
      # Override specific values for containerized environment
      DB_HOST: postgres
      RIPPLED_RPC_ADMIN: http://rippled:5005
      PORT: 3000
      ADDR: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vhs-network
    restart: unless-stopped

  # Validator History Service - Crawler
  vhs-crawler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vhs-crawler
    command: ["node", "build/index.js", "--crawler"]
    env_file:
      - path: .env
        required: false
    environment:
      # Override specific values for containerized environment
      DB_HOST: postgres
      RIPPLED_RPC_ADMIN: http://rippled:5005
      PORT: 3000
      ADDR: 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vhs-network
    restart: unless-stopped

networks:
  vhs-network:
    driver: bridge

volumes:
  postgres_data:
  rippled_data:
